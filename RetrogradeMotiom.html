<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heliocentric Explainer: Retrograde & Stationary Points</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: sans-serif; }
        canvas { display: block; }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #444;
            max-width: 340px;
            backdrop-filter: blur(10px);
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        select, input { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 8px; border-radius: 6px; font-size: 0.9rem; }
        .legend { font-size: 0.75rem; margin-top: 10px; color: #bbb; display: flex; flex-direction: column; gap: 6px; }
        
        /* Status Indicator Styles */
        #statusIndicator {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .state-direct { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid #22c55e; }
        .state-stationary { background: rgba(234, 179, 8, 0.4); color: #facc15; border: 1px solid #eab308; animation: pulse 0.5s infinite alternate; }
        .state-retrograde { background: rgba(239, 68, 68, 0.3); color: #f87171; border: 1px solid #ef4444; }

        @keyframes pulse { 
            0% { transform: scale(1); opacity: 0.8; } 
            100% { transform: scale(1.02); opacity: 1; } 
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h1 class="text-xl font-bold mb-1">Retrograde & Stationary</h1>
        <p class="text-xs text-gray-400 mb-4">The "Lapping" Effect in Heliocentrism</p>
        
        <div class="control-group">
            <label>1. Select Focus Planet</label>
            <select id="planetSelector">
                <option value="mars">Mars (Best Example)</option>
                <option value="jupiter">Jupiter</option>
                <option value="saturn">Saturn</option>
                <option value="venus">Venus (Inner Planet)</option>
                <option value="mercury">Mercury</option>
            </select>
        </div>

        <div class="control-group">
            <label>2. Simulation Speed</label>
            <input type="range" id="speedSlider" min="0" max="8" step="0.1" value="1.5">
        </div>

        <div class="control-group">
            <label class="flex items-center gap-2 cursor-pointer text-sm">
                <input type="checkbox" id="showSightLine" checked> Show Line of Sight
            </label>
        </div>

        <!-- Dynamic Status Display -->
        <div id="statusIndicator" class="state-direct">Direct Motion</div>

        <div id="description" class="mt-4 p-3 bg-white/5 border border-white/10 rounded text-xs leading-relaxed text-gray-300">
            A planet becomes <span class="text-yellow-400 font-bold italic">Stationary</span> at the exact moment Earth's relative velocity aligns with the planet's, just before the "loops" begin or end.
        </div>

        <div class="legend">
            <div class="flex items-center gap-2"><span class="w-3 h-3 bg-blue-500 rounded-full"></span> Earth</div>
            <div class="flex items-center gap-2" id="planetColorLegend"><span class="w-3 h-3 bg-red-500 rounded-full"></span> Mars</div>
            <div class="flex items-center gap-2"><span class="w-10 h-0.5 bg-white opacity-50"></span> Sight Line (Current View)</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, earth, sun, stars, sightLine, starSphere, stationaryMarker;
        let clock = new THREE.Clock();
        
        const planetsConfig = {
            mercury: { radius: 8, color: 0xaaaaaa, size: 0.5, name: "Mercury" },
            venus: { radius: 12, color: 0xffeebb, size: 0.8, name: "Venus" },
            mars: { radius: 24, color: 0xff4422, size: 0.7, name: "Mars" },
            jupiter: { radius: 36, color: 0xffa500, size: 1.5, name: "Jupiter" },
            saturn: { radius: 48, color: 0xead6b8, size: 1.3, name: "Saturn" }
        };

        const EARTH_RADIUS = 18;
        const CELESTIAL_SPHERE_RADIUS = 200;
        let currentPlanetKey = 'mars';
        let earthAngle = 0;
        let planetAngle = Math.PI / 4; 
        let lastSightAngle = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 110, 130);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0x404040, 2));
            const pointLight = new THREE.PointLight(0xffffff, 3);
            pointLight.position.set(0, 50, 0);
            scene.add(pointLight);

            // Sun
            sun = new THREE.Mesh(new THREE.SphereGeometry(4, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            scene.add(sun);

            // Earth
            earth = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), new THREE.MeshPhongMaterial({ color: 0x2244ff }));
            scene.add(earth);

            // Sight Line
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
            sightLine = new THREE.Line(new THREE.BufferGeometry(), lineMat);
            scene.add(sightLine);

            // Stationary Visual Marker (A glow ring)
            const ringGeo = new THREE.RingGeometry(1.2, 1.8, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide, transparent: true, opacity: 0 });
            stationaryMarker = new THREE.Mesh(ringGeo, ringMat);
            stationaryMarker.rotation.x = Math.PI / 2;
            scene.add(stationaryMarker);

            // Celestial Sphere
            const starSphereGeo = new THREE.SphereGeometry(CELESTIAL_SPHERE_RADIUS, 64, 64);
            starSphere = new THREE.Mesh(starSphereGeo, new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.BackSide, transparent: true, opacity: 0.3 }));
            scene.add(starSphere);

            // Stars
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<10000; i++) {
                const r = CELESTIAL_SPHERE_RADIUS - 1;
                const theta = 2 * Math.PI * Math.random();
                const phi = Math.acos(2 * Math.random() - 1);
                starCoords.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 })));

            setupFocusPlanet();

            window.addEventListener('resize', onWindowResize, false);
            document.getElementById('planetSelector').addEventListener('change', (e) => {
                currentPlanetKey = e.target.value;
                setupFocusPlanet();
            });
            
            animate();
        }

        let focusPlanetMesh;
        let focusOrbit;

        function setupFocusPlanet() {
            if (focusPlanetMesh) scene.remove(focusPlanetMesh);
            if (focusOrbit) scene.remove(focusOrbit);
            
            const config = planetsConfig[currentPlanetKey];
            focusOrbit = new THREE.Mesh(new THREE.TorusGeometry(config.radius, 0.05, 16, 100), new THREE.MeshBasicMaterial({ color: config.color, transparent: true, opacity: 0.2 }));
            focusOrbit.rotation.x = Math.PI/2;
            scene.add(focusOrbit);

            focusPlanetMesh = new THREE.Mesh(new THREE.SphereGeometry(config.size, 24, 24), new THREE.MeshPhongMaterial({ color: config.color }));
            scene.add(focusPlanetMesh);

            document.getElementById('planetColorLegend').innerHTML = `<span class="w-3 h-3 rounded-full" style="background-color: #${config.color.toString(16)}"></span> ${config.name}`;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const speed = parseFloat(document.getElementById('speedSlider').value);
            const config = planetsConfig[currentPlanetKey];

            // 1. Update Angles
            earthAngle += 1.0 * delta * speed;
            const orbitSpeed = Math.pow(EARTH_RADIUS / config.radius, 1.5);
            planetAngle += orbitSpeed * delta * speed;

            earth.position.set(Math.cos(earthAngle) * EARTH_RADIUS, 0, Math.sin(earthAngle) * EARTH_RADIUS);
            focusPlanetMesh.position.set(Math.cos(planetAngle) * config.radius, 0, Math.sin(planetAngle) * config.radius);

            // 2. Sight Line
            const dir = new THREE.Vector3().subVectors(focusPlanetMesh.position, earth.position).normalize();
            const starPoint = earth.position.clone().add(dir.clone().multiplyScalar(CELESTIAL_SPHERE_RADIUS));
            
            if (document.getElementById('showSightLine').checked) {
                sightLine.geometry.setFromPoints([earth.position, starPoint]);
                sightLine.visible = true;
            } else {
                sightLine.visible = false;
            }

            // 3. Detect Motion State
            const currentSightAngle = Math.atan2(dir.z, dir.x);
            let angleDiff = currentSightAngle - lastSightAngle;
            if (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            if (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

            const isOuter = config.radius > EARTH_RADIUS;
            const indicator = document.getElementById('statusIndicator');
            
            // Stationary Threshold (Relative velocity of sight line is near zero)
            const stationaryEpsilon = 0.0015 * speed;
            const isMovingBackward = isOuter ? (angleDiff < 0) : (angleDiff > 0);
            const absoluteMotion = Math.abs(angleDiff);

            if (speed > 0) {
                if (absoluteMotion < stationaryEpsilon) {
                    // STATIONARY STATE
                    indicator.innerText = "Stationary Point";
                    indicator.className = "state-stationary";
                    stationaryMarker.position.copy(focusPlanetMesh.position);
                    stationaryMarker.material.opacity = 0.8;
                    stationaryMarker.scale.set(1 + Math.sin(Date.now() * 0.01) * 0.2, 1 + Math.sin(Date.now() * 0.01) * 0.2, 1);
                } else if (isMovingBackward) {
                    // RETROGRADE STATE
                    indicator.innerText = "Retrograde Motion";
                    indicator.className = "state-retrograde";
                    stationaryMarker.material.opacity = 0;
                } else {
                    // DIRECT STATE
                    indicator.innerText = "Direct Motion";
                    indicator.className = "state-direct";
                    stationaryMarker.material.opacity = 0;
                }
            } else {
                stationaryMarker.material.opacity = 0;
            }

            lastSightAngle = currentSightAngle;
            renderer.render(scene, camera);
        }

        // Standard Mouse Controls
        let isMouseDown = false;
        document.addEventListener('mousedown', () => isMouseDown = true);
        document.addEventListener('mouseup', () => isMouseDown = false);
        document.addEventListener('mousemove', (e) => {
            if (isMouseDown) {
                camera.position.x += e.movementX * 0.15;
                camera.position.y -= e.movementY * 0.15;
                camera.lookAt(0, 0, 0);
            }
        });

        init();
    </script>
</body>
</html>
