<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishna & Shukla Paksha Animation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0b0c10;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        
        /* Custom styling for the range slider */
        input[type=range] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            height: 6px;
            outline: none;
            transition: background 0.3s;
        }
        input[type=range]:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #f6e05e;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(246, 224, 94, 0.6);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        
        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col relative">

    <!-- UI Overlay Layer -->
    <div class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between">
        
        <!-- Top Section: Header & Info Panels -->
        <div class="w-full flex flex-col md:flex-row justify-between items-start p-6 md:p-8 gap-4">
            
            <!-- Dynamic State Panel (Left) -->
            <div class="glass-panel p-5 rounded-2xl pointer-events-auto min-w-[240px] order-2 md:order-1">
                <p id="paksha-label" class="text-xs uppercase tracking-widest text-gray-400 mb-1 font-semibold">Current Phase</p>
                <h2 id="paksha-name" class="text-2xl md:text-3xl font-bold text-yellow-400 mb-1 transition-colors duration-500 shadow-sm">Shukla Paksha</h2>
                <div class="flex items-end gap-2">
                    <h3 id="tithi-name" class="text-xl text-white">Prathama</h3>
                    <p id="day-counter" class="text-gray-400 text-xs mb-1">(Day 1)</p>
                </div>
            </div>

            <!-- Header (Center) -->
            <header class="text-center drop-shadow-2xl mx-auto order-1 md:order-2">
                <h1 class="text-2xl md:text-4xl font-bold tracking-widest text-white mb-1 uppercase" style="text-shadow: 0 0 20px rgba(255,255,255,0.3);">Lunar Phases</h1>
                <p class="text-sm md:text-base font-light text-gray-400">Hindu Lunar Calendar</p>
            </header>

            <!-- Educational Legend (Right) -->
            <div class="hidden lg:block glass-panel p-5 rounded-2xl max-w-xs pointer-events-auto text-left order-3">
                <div class="space-y-2 text-xs text-gray-300">
                    <p><strong class="text-yellow-400">Shukla Paksha (Waxing):</strong> Bright fortnight. Approaches Purnima (Full Moon).</p>
                    <p><strong class="text-blue-400">Krishna Paksha (Waning):</strong> Dark fortnight. Approaches Amavasya (New Moon).</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Interactive Controls Layer -->
    <div class="absolute bottom-0 w-full glass-panel border-t border-gray-800 p-4 z-20 flex flex-col md:flex-row items-center justify-center gap-6">
        
        <!-- Play/Pause Button -->
        <button id="play-btn" class="w-14 h-14 flex-shrink-0 flex items-center justify-center bg-white text-black hover:bg-yellow-400 rounded-full transition-all focus:outline-none shadow-[0_0_15px_rgba(255,255,255,0.2)]">
            <svg id="icon-play" class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        
        <!-- Timeline Slider -->
        <div class="w-full max-w-3xl flex items-center gap-4 px-2">
            <span class="text-xs font-bold tracking-wider text-gray-500 uppercase w-16 text-right">Amavasya</span>
            <input type="range" id="phase-slider" min="0" max="1" step="0.001" value="0" class="w-full">
            <span class="text-xs font-bold tracking-wider text-gray-500 uppercase w-16 text-left">Amavasya</span>
        </div>
        
        <!-- Speed Selector -->
        <div class="flex items-center gap-3 text-sm font-medium text-gray-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <select id="speed-select" class="bg-gray-800/80 text-white border border-gray-700 rounded-lg px-3 py-1.5 outline-none focus:border-yellow-500 transition-colors appearance-none cursor-pointer">
                <option value="0.0003">Slow</option>
                <option value="0.001" selected>Normal</option>
                <option value="0.003">Fast</option>
            </select>
        </div>
    </div>

    <!-- Main Rendering Canvas -->
    <canvas id="astro-canvas" class="absolute inset-0 z-0 w-full h-full"></canvas>

    <script>
        // --- Configuration & State ---
        const canvas = document.getElementById('astro-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let phase = 0.0; // 0.0 to 1.0 (0=New, 0.5=Full, 1.0=New)
        let isPlaying = true;
        let animationSpeed = 0.001;
        let stars = [];

        // UI Elements
        const pakshaNameEl = document.getElementById('paksha-name');
        const tithiNameEl = document.getElementById('tithi-name');
        const dayCounterEl = document.getElementById('day-counter');
        const phaseSlider = document.getElementById('phase-slider');
        const playBtn = document.getElementById('play-btn');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const speedSelect = document.getElementById('speed-select');

        // Hindu Lunar Days (Tithis)
        const tithiNames = [
            "Prathama", "Dwitiya", "Tritiya", "Chaturthi", "Panchami",
            "Shashthi", "Saptami", "Ashtami", "Navami", "Dashami",
            "Ekadashi", "Dwadashi", "Trayodashi", "Chaturdashi"
        ];

        // --- Initialization ---
        function resize() {
            // Guard against 0 sizing
            width = Math.max(100, window.innerWidth);
            height = Math.max(100, window.innerHeight);
            canvas.width = width;
            canvas.height = height;
            initStars();
        }

        window.addEventListener('resize', resize);
        resize();

        function initStars() {
            stars = [];
            const numStars = Math.floor((width * height) / 1500); 
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 1.5 + 0.5,
                    alpha: Math.random(),
                    speed: (Math.random() * 0.02) + 0.005,
                    color: Math.random() > 0.8 ? '#f6e05e' : (Math.random() > 0.5 ? '#93c5fd' : '#ffffff')
                });
            }
        }

        // --- Event Listeners ---
        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            updatePlayIcon();
        });

        function updatePlayIcon() {
            if (isPlaying) {
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
            } else {
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
            }
        }
        updatePlayIcon();

        phaseSlider.addEventListener('input', (e) => {
            let val = parseFloat(e.target.value);
            phase = isNaN(val) ? 0 : val; // Failsafe against NaN
            isPlaying = false;
            updatePlayIcon();
            updateUI();
        });

        speedSelect.addEventListener('change', (e) => {
            let val = parseFloat(e.target.value);
            animationSpeed = isNaN(val) ? 0.001 : val; // Failsafe against NaN
        });

        // --- Drawing Logic ---

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, height || 1);
            gradient.addColorStop(0, '#02040a');
            gradient.addColorStop(1, '#0f172a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.alpha += star.speed;
                if (star.alpha > 1 || star.alpha < 0) {
                    star.speed *= -1;
                }
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = star.color;
                ctx.globalAlpha = Math.max(0, Math.min(1, star.alpha));
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;
        }

        function drawMoon(cx, cy, radius, p) {
            // Guard clause to ensure valid radius drawing
            const safeRadius = Math.max(0.1, radius); 

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(15 * Math.PI / 180);

            // Base dark moon
            ctx.beginPath();
            ctx.arc(0, 0, safeRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#111827'; 
            ctx.fill();
            
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.stroke();

            const brightColor = '#fffae6';

            if (p <= 0.5) {
                // SHUKLA PAKSHA (Waxing)
                ctx.fillStyle = brightColor;
                ctx.beginPath();
                ctx.arc(0, 0, safeRadius, -Math.PI/2, Math.PI/2);
                ctx.fill();

                let t = p / 0.5; 
                let ellipseWidth = safeRadius * Math.abs(Math.cos(t * Math.PI));

                ctx.beginPath();
                // Safe ellipse drawing prevents negative/0 radii
                ctx.ellipse(0, 0, Math.max(0.01, ellipseWidth), safeRadius, 0, 0, Math.PI*2);
                ctx.fillStyle = t < 0.5 ? '#111827' : brightColor;
                ctx.fill();
            } else {
                // KRISHNA PAKSHA (Waning)
                ctx.fillStyle = brightColor;
                ctx.beginPath();
                ctx.arc(0, 0, safeRadius, Math.PI/2, -Math.PI/2);
                ctx.fill();

                let t = (p - 0.5) / 0.5; 
                let ellipseWidth = safeRadius * Math.abs(Math.cos(t * Math.PI));

                ctx.beginPath();
                ctx.ellipse(0, 0, Math.max(0.01, ellipseWidth), safeRadius, 0, 0, Math.PI*2);
                ctx.fillStyle = t < 0.5 ? brightColor : '#111827';
                ctx.fill();
            }

            let glowIntensity = Math.sin(p * Math.PI); 
            if (glowIntensity > 0.1) {
                ctx.shadowBlur = 40 * glowIntensity;
                ctx.shadowColor = 'rgba(255, 250, 230, 0.5)';
                ctx.beginPath();
                ctx.arc(0, 0, safeRadius, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(0,0,0,0)'; 
                ctx.fill(); 
            }

            ctx.restore();
        }

        function drawSpaceSystem(cx, cy, maxRadius, p) {
            ctx.save();
            ctx.translate(cx, cy);

            const safeMaxRadius = Math.max(0.1, maxRadius);

            const orbitEX = safeMaxRadius * 0.8;
            const orbitEY = safeMaxRadius * 0.35;
            
            let angleE = Math.PI/2 - (p * (Math.PI * 2 / 12)); 
            let ex = Math.cos(angleE) * orbitEX;
            let ey = Math.sin(angleE) * orbitEY;
            
            // Using pure Math.sin for perspective scale safely removes division
            const scaleE = 1 + Math.sin(angleE) * 0.2;
            const eRadius = Math.max(0.1, safeMaxRadius * 0.12 * scaleE);

            const orbitMX = eRadius * 2.5;
            const orbitMY = eRadius * 0.8;
            
            let angleToSunFromEarth = Math.atan2(-ey, -ex) || 0; 
            let angleM = angleToSunFromEarth - p * Math.PI * 2; 
            
            let mx = ex + Math.cos(angleM) * orbitMX;
            let my = ey + Math.sin(angleM) * orbitMY;
            
            const scaleM = 1 + Math.sin(angleM) * 0.2;
            const mRadius = Math.max(0.1, (eRadius * 0.4) * scaleM);

            // Orbit Paths
            ctx.beginPath();
            ctx.ellipse(0, 0, Math.max(0.1, orbitEX), Math.max(0.1, orbitEY), 0, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.setLineDash([4, 6]);
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.beginPath();
            ctx.ellipse(ex, ey, Math.max(0.1, orbitMX), Math.max(0.1, orbitMY), 0, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.setLineDash([2, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Line of sight
            ctx.beginPath();
            ctx.moveTo(ex, ey);
            ctx.lineTo(mx, my);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
            ctx.setLineDash([2, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Celestial bodies
            const drawSun = () => {
                ctx.save();
                let sunRadius = Math.max(0.1, safeMaxRadius * 0.2);
                ctx.beginPath();
                ctx.arc(0, 0, sunRadius, 0, Math.PI*2);
                let sunGrad = ctx.createRadialGradient(0,0,0, 0,0, sunRadius);
                sunGrad.addColorStop(0, '#ffffff');
                sunGrad.addColorStop(0.3, '#fef08a');
                sunGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = sunGrad;
                ctx.fill();
                
                ctx.fillStyle = '#fef08a';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('SUN', 0, safeMaxRadius * 0.25);
                ctx.restore();
            };

            const drawEarth = () => {
                ctx.save();
                ctx.translate(ex, ey);
                
                ctx.beginPath();
                ctx.arc(0, 0, eRadius, 0, Math.PI*2);
                ctx.clip(); 
                
                ctx.fillStyle = '#1d4ed8'; 
                ctx.fill();

                // Accurate 3D spherical rotation + 23.5 degree axial tilt
                ctx.save();
                ctx.rotate(23.5 * Math.PI / 180); 

                ctx.fillStyle = '#22c55e';
                let earthRotations = p * Math.PI * 2 * 29.53; // ~29.5 days in lunar cycle

                const draw3DContinent = (initialLon, lat, w, h) => {
                    let currentLon = initialLon + earthRotations;
                    let z = Math.cos(currentLon);
                    
                    // Only draw if facing the camera (with slight buffer for edges)
                    if (z > -0.2) { 
                        let x = Math.sin(currentLon) * eRadius;
                        let y = lat * eRadius;
                        
                        // Foreshorten width as it approaches the edge to simulate 3D curve
                        let apparentWidth = Math.max(0.1, w * eRadius * Math.abs(z));
                        let apparentHeight = Math.max(0.1, h * eRadius);
                        
                        ctx.beginPath();
                        ctx.ellipse(x, y, apparentWidth, apparentHeight, 0, 0, Math.PI*2);
                        ctx.fill();
                    }
                };

                // Draw wrapping landmasses
                draw3DContinent(0, -0.3, 0.5, 0.4);
                draw3DContinent(Math.PI * 0.7, 0.2, 0.6, 0.5);
                draw3DContinent(Math.PI * 1.4, -0.1, 0.4, 0.3);
                draw3DContinent(Math.PI * 0.3, 0.6, 0.5, 0.2);
                draw3DContinent(Math.PI * 1.8, 0.4, 0.3, 0.4);
                ctx.restore();

                let angleToSun = Math.atan2(-ey, -ex) || 0;
                let shadowX = Math.cos(angleToSun) * eRadius * 0.6;
                let shadowY = Math.sin(angleToSun) * eRadius * 0.6;

                // Failsafe gradient boundaries
                let rInner = Math.max(0.1, eRadius * 0.05);
                let rOuter = Math.max(0.2, eRadius * 1.1);
                let eGrad = ctx.createRadialGradient(shadowX || 0, shadowY || 0, rInner, 0, 0, rOuter);
                
                eGrad.addColorStop(0, 'rgba(255, 255, 255, 0.2)'); 
                eGrad.addColorStop(0.4, 'rgba(0, 0, 0, 0)'); 
                eGrad.addColorStop(0.7, 'rgba(0, 0, 0, 0.8)'); 
                eGrad.addColorStop(1, 'rgba(0, 0, 0, 0.95)'); 
                
                ctx.fillStyle = eGrad;
                ctx.fillRect(-eRadius*1.5, -eRadius*1.5, eRadius*3, eRadius*3);

                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('EARTH', 0, eRadius + 15);
                ctx.restore();
            };

            const drawOrbitingMoon = () => {
                ctx.save();
                ctx.translate(mx, my);

                ctx.beginPath();
                ctx.arc(0, 0, mRadius, 0, Math.PI*2);
                
                let angleToSun = Math.atan2(-my, -mx) || 0;
                let shadowX = Math.cos(angleToSun) * mRadius * 0.6;
                let shadowY = Math.sin(angleToSun) * mRadius * 0.6;

                // Failsafe gradient boundaries
                let rInner = Math.max(0.1, mRadius * 0.05);
                let rOuter = Math.max(0.2, mRadius * 1.1);
                let mGrad = ctx.createRadialGradient(shadowX || 0, shadowY || 0, rInner, 0, 0, rOuter);
                
                mGrad.addColorStop(0, '#fef08a');   
                mGrad.addColorStop(0.4, '#a1a1aa'); 
                mGrad.addColorStop(0.7, '#18181b'); 
                mGrad.addColorStop(1, '#000000');   
                
                ctx.fillStyle = mGrad;
                ctx.fill();
                
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.font = '9px sans-serif';
                let labelOffY = (my > ey) ? mRadius + 12 : -mRadius - 6;
                ctx.fillText('MOON', 0, labelOffY);

                ctx.restore();
            };

            const celestialBodies = [
                { y: 0,  draw: drawSun },
                { y: ey, draw: drawEarth },
                { y: my, draw: drawOrbitingMoon }
            ];

            celestialBodies.sort((a, b) => a.y - b.y);
            celestialBodies.forEach(body => body.draw());

            ctx.restore();
        }

        // --- Data Logic & UI Updates ---
        
        function updateUI() {
            let exactDay = phase * 30;
            let dayInt = Math.floor(exactDay) + 1;
            if (dayInt > 30) dayInt = 30; 

            let paksha, tithiName, tithiColor;

            if (exactDay < 15) {
                paksha = "Shukla Paksha";
                tithiColor = "text-yellow-400";
                
                if (dayInt === 15) {
                    tithiName = "Purnima (Full Moon)";
                } else {
                    tithiName = tithiNames[dayInt - 1] || "Prathama";
                }
            } else {
                paksha = "Krishna Paksha";
                tithiColor = "text-blue-400";
                
                let krishaDayInt = dayInt - 15;
                if (krishaDayInt === 15) {
                    tithiName = "Amavasya (New Moon)";
                } else {
                    tithiName = tithiNames[krishaDayInt - 1] || "Prathama";
                }
            }

            if (pakshaNameEl.innerText !== paksha) {
                pakshaNameEl.innerText = paksha;
                pakshaNameEl.className = `text-2xl md:text-3xl font-bold mb-1 transition-colors duration-500 shadow-sm ${tithiColor}`;
            }
            
            tithiNameEl.innerText = tithiName;
            dayCounterEl.innerText = `(Day ${dayInt} of 30)`;
            
            if (isPlaying) {
                phaseSlider.value = phase;
            }
        }

        // --- Main Animation Loop ---
        function animate() {
            // Auto-recover size if window dimensions update (fixes the "black screen")
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                resize();
            }

            ctx.clearRect(0, 0, width, height);

            if (isPlaying) {
                phase += animationSpeed;
                if (phase >= 1.0) phase = 0; 
                if (isNaN(phase)) phase = 0; // Absolute failsafe
                updateUI();
            }

            drawBackground();

            const isLandscape = width > height;
            
            const earthViewX = isLandscape ? width * 0.25 : width * 0.5;
            const earthViewY = isLandscape ? height * 0.55 : height * 0.35;
            const earthRadius = isLandscape ? Math.min(width, height) * 0.22 : Math.min(width, height) * 0.15;

            const spaceViewX = isLandscape ? width * 0.75 : width * 0.5;
            const spaceViewY = isLandscape ? height * 0.55 : height * 0.7;
            const spaceRadius = isLandscape ? Math.min(width, height) * 0.25 : Math.min(width, height) * 0.18;

            drawMoon(earthViewX, earthViewY, earthRadius, phase);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.font = '600 12px tracking-widest sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('VIEW FROM EARTH', earthViewX, earthViewY - earthRadius - 25);

            drawSpaceSystem(spaceViewX, spaceViewY, spaceRadius, phase);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fillText('3D ECLIPTIC ORBIT VIEW', spaceViewX, spaceViewY - spaceRadius - 25);

            requestAnimationFrame(animate);
        }

        updateUI();
        animate();

    </script>
</body>
</html>
